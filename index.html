<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIPEGAS App</title>
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>
    <div class="container">

        <div class="header-empresa">
            <img src="logo-cipegas.png" alt="Logo" class="logo-img">
            <div class="info-empresa">
                <h1>COMPAÑIA PETROLERA & GAS CARO SAC</h1>
                <p>Control de Gestión y Finanzas</p>
            </div>
        </div>
        <h2 id="saludo-gerente" style="font-size: 16px; color: #555; margin-bottom: 20px;"></h2>

        <button id="btnFlotanteCuentas" onclick="abrirModalCuentas()"
            style="position: fixed; bottom: 80px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #34495e; color: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 24px; z-index: 1000;">
            🏦
        </button>

        <div id="modalCuentas" class="modal-overlay" onclick="cerrarSiClickFuera(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h3 style="margin:0;">Agenda de Cuentas</h3>
                    <button class="btn-cerrar-modal" onclick="cerrarModalCuentas()">×</button>
                </div>
                <div id="contenedorCuentasModal"></div>
            </div>
        </div>

        <nav class="menu-tabs">
            <button id="btn-movimientos" class="tab-btn">Bancos</button>
            <button id="btn-cobranzas" class="tab-btn">Cobranzas</button>
            <button id="btn-proveedores" class="tab-btn">Proveedores</button>
        </nav>

        <main>
            <div id="sec-movimientos" class="tab-content">
                <div id="listaBancos"></div>
                <div class="seccion-prestamos" style="margin-top: 30px;">
                    <h3>Obligaciones Financieras</h3>
                    <div id="listaPrestamos"></div>
                </div>
            </div>

            <div id="sec-cobranzas" class="tab-content">
                <div id="listaCobranzas"></div>
                <div id="detalleCobranza" style="display: none;"></div>
            </div>

            <div id="sec-proveedores" class="tab-content">
                <div id="listaProveedores"></div>
                <div id="detalleProveedores" style="display: none;"></div>
            </div>
        </main>
    </div>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
